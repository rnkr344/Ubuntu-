name: Build Redmi Note 11T 5G Ubuntu Touch Kernel

on:
  workflow_dispatch: # GitHub UI par "Run workflow" button dikhane ke liye

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Setup Legacy Dependencies (libtinfo5 & Python 2)
      run: |
        sudo apt update
        # 1. Fetch and install legacy libtinfo5 manually for Ubuntu 24.04
        wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
        sudo apt install -y ./libtinfo5_6.3-2ubuntu0.1_amd64.deb
        
        # 2. Install Python 2 via a standalone miniconda environment and link it globally
        wget https://anaconda.com -O miniconda.sh
        bash miniconda.sh -b -p $HOME/miniconda
        $HOME/miniconda/bin/conda create -y -n py27 python=2.7
        sudo ln -sf $HOME/miniconda/envs/py27/bin/python /usr/bin/python2

    - name: Setup Build Environment
      run: |
        sudo apt update
        # Installs all required dependencies except python2 and libtinfo5 which are handled above
        sudo apt install -y bc bison build-essential cpio curl flex git libssl-dev libncurses5-dev xz-utils liblz4-tool jq

    - name: Download Proton Clang Toolchain
      run: |
        git clone --depth=1 https://github.com $GITHUB_WORKSPACE/proton-clang

    - name: Clone Kernel Source
      run: |
        # MediaTek evergo source clone kiya ja raha hai
        git clone --depth=1 -b master https://github.com $GITHUB_WORKSPACE/kernel

    - name: Apply Minimal Halium Patches
      run: |
        cd $GITHUB_WORKSPACE/kernel
        CONFIG_PATH="arch/arm64/configs"
        mkdir -p $CONFIG_PATH
        
        echo "🛠️ Ubuntu Touch ke liye halium.config create ho rahi hai..."
        cat << EOF > $CONFIG_PATH/halium.config
        CONFIG_DEVTMPFS=y
        CONFIG_FHANDLE=y
        CONFIG_SYSVIPC=y
        CONFIG_IPC_NS=y
        CONFIG_NET_NS=y
        CONFIG_PID_NS=y
        CONFIG_USER_NS=y
        CONFIG_UTS_NS=y
        CONFIG_VT=y
        EOF
        
        echo "✅ halium.config successfully generated!"

    - name: Compile Kernel with Halium Patches
      run: |
        cd $GITHUB_WORKSPACE/kernel
        mkdir -p out
        
        # Toolchain paths setup
        export PATH="$GITHUB_WORKSPACE/proton-clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Base make flags
        MAKE_FLAGS=(
            O=out
            CC=clang
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LD=ld.lld
        )
        
        echo "🔄 Config generate ho raha hai (evergo_defconfig + halium.config)..."
        # Pehle base defconfig load karenge
        make "${MAKE_FLAGS[@]}" evergo_defconfig
        
        # Halium configs ko final .config me append karenge
        cat arch/arm64/configs/halium.config >> out/.config
        
        # Config ko refresh karenge naye options ke sath
        make "${MAKE_FLAGS[@]}" olddefconfig
        
        echo "🚀 Kernel compilation start ho rahi hai..."
        make -j$(nproc --all) "${MAKE_FLAGS[@]}"

    - name: Upload Ubuntu Touch Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ubuntu-Touch-Kernel-evergo
        path: |
          kernel/out/arch/arm64/boot/Image.gz
          kernel/out/arch/arm64/boot/dtb.img
