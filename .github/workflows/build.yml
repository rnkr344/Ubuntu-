name: Build Redmi Note 11T 5G Ubuntu Touch Kernel

on:
  workflow_dispatch: # GitHub UI par "Run workflow" button dikhane ke liye

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Legacy Dependencies (libtinfo5 & Python 2)
      run: |
        sudo apt update
        # 1. Fetch and install legacy libtinfo5 manually for Ubuntu 24.04 (Noble)
        wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.4-2_amd64.deb || \
        wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
        sudo apt install -y ./libtinfo5_*.deb
        
        # 2. Install Python 2 via Miniconda cleanly
        mkdir -p $HOME/miniconda
        wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh
        bash miniconda.sh -b -u -p $HOME/miniconda
        $HOME/miniconda/bin/conda create -y -n py27 python=2.7
        # Globally link python2
        sudo ln -sf $HOME/miniconda/envs/py27/bin/python /usr/bin/python2
        sudo ln -sf $HOME/miniconda/envs/py27/bin/python /usr/bin/python

    - name: Setup Build Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential cpio curl flex git libssl-dev libncurses5-dev xz-utils liblz4-tool jq u-boot-tools libgmp-dev libmpfr-dev libmpc-dev

    - name: Download Proton Clang Toolchain
      run: |
        # Sahi repository path use kiya gaya hai
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/proton-clang

    - name: Clone Kernel Source
      run: |
        # MediaTek evergo repo source template
        git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b evergo-r-oss $GITHUB_WORKSPACE/kernel

    - name: Apply Minimal Halium Patches
      run: |
        cd $GITHUB_WORKSPACE/kernel
        CONFIG_PATH="arch/arm64/configs"
        mkdir -p $CONFIG_PATH
        
        echo "🛠️ Ubuntu Touch ke liye halium.config create ho rahi hai..."
        cat << EOF > $CONFIG_PATH/halium.config
        CONFIG_DEVTMPFS=y
        CONFIG_FHANDLE=y
        CONFIG_SYSVIPC=y
        CONFIG_IPC_NS=y
        CONFIG_NET_NS=y
        CONFIG_PID_NS=y
        CONFIG_USER_NS=y
        CONFIG_UTS_NS=y
        CONFIG_VT=y
        EOF
        
        echo "✅ halium.config successfully generated!"

    # KERNEL BUILD RESUME CACHE INTERACTION CODE ADDED
    - name: Cache Kernel Out Directory (Resume Feature)
      uses: actions/cache@v4
      with:
        path: kernel/out
        key: kernel-build-cache-${{ github.sha }}
        restore-keys: |
          kernel-build-cache-

    - name: Compile Kernel with Halium Patches
      run: |
        cd $GITHUB_WORKSPACE/kernel
        mkdir -p out
        
        CLANG_DIR="$GITHUB_WORKSPACE/proton-clang"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Base make flags (Sahi explicit GNU Tools path map kiya hai taaki '-EL' error fix ho)
        MAKE_FLAGS=(
            O=out
            CC="$CLANG_DIR/bin/clang"
            CROSS_COMPILE="$CLANG_DIR/bin/aarch64-linux-gnu-"
            CROSS_COMPILE_ARM32="$CLANG_DIR/bin/arm-linux-gnueabi-"
            LD="$CLANG_DIR/bin/ld.lld"
            AR="$CLANG_DIR/bin/llvm-ar"
            NM="$CLANG_DIR/bin/llvm-nm"
            OBJCOPY="$CLANG_DIR/bin/llvm-objcopy"
            OBJDUMP="$CLANG_DIR/bin/llvm-objdump"
            STRIP="$CLANG_DIR/bin/llvm-strip"
            OBJSIZE="$CLANG_DIR/bin/llvm-size"
            AS="$CLANG_DIR/bin/aarch64-linux-gnu-as"
            LLVM_IAS=0
        )
        
        # Agar purana built data out/.config me para hai toh hum use destroy nahi karenge (Resume function logic)
        if [ ! -f "out/.config" ]; then
            echo "🔄 Naya Config generate ho raha hai (evergo_defconfig + halium.config)..."
            make "${MAKE_FLAGS[@]}" evergo_defconfig
            ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/halium.config
            make "${MAKE_FLAGS[@]}" olddefconfig
        else
            echo "📦 Purani build ka out/.config mil gaya hai! Wahan se compilation resume ho rahi hai..."
            make "${MAKE_FLAGS[@]}" olddefconfig
        fi
        
        echo "🚀 Kernel compilation start/resume ho rahi hai..."
        make -j$(nproc --all) "${MAKE_FLAGS[@]}"

    - name: Upload Ubuntu Touch Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ubuntu-Touch-Kernel-evergo
        path: |
          kernel/out/arch/arm64/boot/Image.gz
          kernel/out/arch/arm64/boot/dtb*
          kernel/out/arch/arm64/boot/dtbo.img
